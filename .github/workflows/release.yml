# Publish SpecLance to crates.io and PyPI on tag push.
#
# - `speclance-core` (Rust library) -> crates.io
# - `speclance-ms`   (Rust library) -> crates.io
# - `speclance`      (Python wheel via maturin matrix) -> PyPI
#
# `speclance-cli` (binary) is intentionally not published to crates.io;
# release binaries can be added later via a separate workflow.
#
# crates.io publish uses CARGO_REGISTRY_TOKEN from the `crates-io`
# environment. PyPI uses trusted publishing (OIDC) under the `pypi`
# environment - no PyPI tokens live in this repo.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cargo-publish-core:
    name: Publish speclance-core to crates.io
    runs-on: ubuntu-latest
    environment:
      name: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Publish speclance-core (skip if version exists)
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json;[print(p['version']) for p in json.load(sys.stdin)['packages'] if p['name']=='speclance-core']")
          echo "speclance-core version: $VERSION"
          if cargo search speclance-core --limit 1 | grep -qE "^speclance-core = \"${VERSION}\""; then
            echo "speclance-core $VERSION already on crates.io, skipping publish."
          else
            cargo publish -p speclance-core
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  cargo-publish-ms:
    name: Publish speclance-ms to crates.io
    needs: cargo-publish-core
    runs-on: ubuntu-latest
    environment:
      name: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # crates.io needs a moment to make speclance-core resolvable.
      - run: sleep 30
      - name: Publish speclance-ms (skip if version exists)
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json;[print(p['version']) for p in json.load(sys.stdin)['packages'] if p['name']=='speclance-ms']")
          echo "speclance-ms version: $VERSION"
          if cargo search speclance-ms --limit 1 | grep -qE "^speclance-ms = \"${VERSION}\""; then
            echo "speclance-ms $VERSION already on crates.io, skipping publish."
          else
            cargo publish -p speclance-ms
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-wheels:
    name: Build wheels (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install protoc (host - needed for non-container builds)
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # abi3-py39 in speclance-py means one wheel covers Python 3.9+,
          # so we only need to build with a single interpreter.
          args: --release --out dist -i python3.11 --manifest-path crates/speclance-py/Cargo.toml
          sccache: "true"
          manylinux: auto
          # The manylinux container does not inherit host tools, so install
          # protoc inside the container too.
          before-script-linux: |
            ARCH=$(uname -m)
            case "$ARCH" in
              x86_64) PROTOC_ARCH=x86_64 ;;
              aarch64) PROTOC_ARCH=aarch_64 ;;
              *) PROTOC_ARCH=$ARCH ;;
            esac
            if command -v apt-get >/dev/null; then
              apt-get update && apt-get install -y protobuf-compiler unzip wget
            elif command -v yum >/dev/null; then
              yum install -y unzip wget || true
              wget -q "https://github.com/protocolbuffers/protobuf/releases/download/v25.3/protoc-25.3-linux-${PROTOC_ARCH}.zip" -O /tmp/p.zip && \
                unzip -o /tmp/p.zip -d /usr/local
            elif command -v apk >/dev/null; then
              apk add --no-cache protobuf-dev
            fi
            protoc --version
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  build-sdist:
    name: Build speclance sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/speclance-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist-speclance
          path: dist

  publish-pypi:
    name: Publish speclance to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/speclance
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist-speclance
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

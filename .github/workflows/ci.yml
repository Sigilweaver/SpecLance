name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout SpecLance
        uses: actions/checkout@v4
        with:
          path: SpecLance

      # Vendor crates are sibling path dependencies. They must be present
      # for cargo to resolve the workspace, even when vendor features are
      # disabled. CI checks out each sibling repo from the same owner.
      - name: Checkout OpenTFRaw
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTFRaw
          path: OpenTFRaw

      - name: Checkout OpenTimsTDF
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTimsTDF
          path: OpenTimsTDF

      - name: Checkout OpenWRaw
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenWRaw
          path: OpenWRaw

      - name: Checkout OpenMassSpec
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenMassSpec
          path: OpenMassSpec

      # Cross-platform protoc install (apt-get is Linux-only; this action
      # covers the macOS/Windows runners added alongside the wheel matrix).
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: SpecLance

      - name: cargo fmt
        working-directory: SpecLance
        run: cargo fmt --all -- --check

      - name: cargo clippy (default features)
        working-directory: SpecLance
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo clippy (all vendor features)
        working-directory: SpecLance
        run: cargo clippy --workspace --all-targets --features all-vendors -- -D warnings

      - name: cargo test (default features)
        working-directory: SpecLance
        run: cargo test --workspace --all-targets
        env:
          # Skip corpus-dependent tests in CI; they no-op when the path is absent.
          SPECLANCE_RUN_CORPUS_TESTS: "0"

      - name: cargo test (thermo feature)
        working-directory: SpecLance
        run: cargo test -p speclance-ms --features thermo --test thermo_adapter

  python:
    name: Python bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout SpecLance
        uses: actions/checkout@v4
        with:
          path: SpecLance

      - name: Checkout OpenTFRaw
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTFRaw
          path: OpenTFRaw

      - name: Checkout OpenTimsTDF
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTimsTDF
          path: OpenTimsTDF

      - name: Checkout OpenWRaw
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenWRaw
          path: OpenWRaw

      - name: Checkout OpenMassSpec
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenMassSpec
          path: OpenMassSpec

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: SpecLance

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install maturin + pytest
        run: pip install --upgrade pip maturin pytest

      - name: Build wheel
        working-directory: SpecLance/crates/speclance-py
        run: maturin build --release --interpreter python3 --out dist

      - name: Install wheel
        working-directory: SpecLance/crates/speclance-py
        # bash for glob expansion of dist/speclance-*.whl - pwsh (the default
        # shell on windows-latest) does not expand wildcards for external
        # command arguments the way bash does.
        shell: bash
        run: pip install --force-reinstall dist/speclance-*.whl

      - name: pytest
        working-directory: SpecLance/crates/speclance-py
        run: pytest tests/ -q

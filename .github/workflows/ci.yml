name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SpecLance
        uses: actions/checkout@v4
        with:
          path: SpecLance

      # Vendor crates are sibling path dependencies. They must be present
      # for cargo to resolve the workspace, even when vendor features are
      # disabled. CI checks out each sibling repo from the same owner.
      - name: Checkout OpenTFRaw
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTFRaw
          path: OpenTFRaw

      - name: Checkout OpenTimsTDF
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTimsTDF
          path: OpenTimsTDF

      - name: Checkout OpenWRaw
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenWRaw
          path: OpenWRaw

      - name: Checkout OpenMassSpec
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenMassSpec
          path: OpenMassSpec

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: SpecLance

      - name: cargo fmt
        working-directory: SpecLance
        run: cargo fmt --all -- --check

      - name: cargo clippy (default features)
        working-directory: SpecLance
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo clippy (all vendor features)
        working-directory: SpecLance
        run: cargo clippy --workspace --all-targets --features all-vendors -- -D warnings

      - name: cargo test (default features)
        working-directory: SpecLance
        run: cargo test --workspace --all-targets
        env:
          # Skip corpus-dependent tests in CI; they no-op when the path is absent.
          SPECLANCE_RUN_CORPUS_TESTS: "0"

      - name: cargo test (thermo feature)
        working-directory: SpecLance
        run: cargo test -p speclance-ms --features thermo --test thermo_adapter

  python:
    name: Python bindings
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout SpecLance
        uses: actions/checkout@v4
        with:
          path: SpecLance

      - name: Checkout OpenTFRaw
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTFRaw
          path: OpenTFRaw

      - name: Checkout OpenTimsTDF
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTimsTDF
          path: OpenTimsTDF

      - name: Checkout OpenWRaw
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenWRaw
          path: OpenWRaw

      - name: Checkout OpenMassSpec
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenMassSpec
          path: OpenMassSpec

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: SpecLance

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin + pytest
        run: pip install --upgrade pip maturin pytest

      - name: Build wheel
        working-directory: SpecLance/crates/speclance-py
        run: maturin build --release --interpreter python3 --out dist

      - name: Install wheel
        working-directory: SpecLance/crates/speclance-py
        run: pip install --force-reinstall dist/speclance-*.whl

      - name: pytest
        working-directory: SpecLance/crates/speclance-py
        run: pytest tests/ -q

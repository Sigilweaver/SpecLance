# Dependency vulnerability audit for SpecLance.
#
# Runs cargo-audit against the RustSec Advisory DB on every push/PR that
# touches the lockfile or manifests, plus a weekly schedule so advisories
# published after the last dependency change are still caught.

name: Audit

on:
  push:
    branches: ["main"]
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@cargo-audit
      # RUSTSEC-2026-0194/0195: quick-xml 0.26.0, pulled in transitively by
      # the lancedb 0.31.0 bump via lance-testing (a normal, non-dev
      # dependency of `lance`) -> pprof -> inferno. inferno only relaxes its
      # quick-xml requirement to >=0.41 from 0.12.0 onward, but pprof's
      # latest release (0.15.0) still pins inferno to "^0.11" (the whole
      # 0.11.x line requires quick-xml "^0.26"), so there is no combination
      # of versions cargo can resolve to today that clears this without
      # pprof itself bumping its inferno requirement upstream. SpecLance's
      # own quick-xml usage is already on 0.41 (unaffected); this is purely
      # a lance-stack dev-tooling transitive dependency (flamegraph
      # profiling support), not part of any SpecLance data path. Re-check
      # whether pprof/inferno have moved before removing this ignore.
      - run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
